services:
    # 1. Ứng dụng Laravel chính
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: sail-app:8.5
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            # GHI ĐÈ KẾT NỐI CHO DOCKER
            DB_HOST: 'host.docker.internal'
            REDIS_HOST: 'redis'
            REVERB_HOST: 'reverb'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - redis

    # 4. Redis Service
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    # 5. Laravel Reverb
    reverb:
        image: sail-app:8.5
        ports:
            - '${REVERB_PORT:-8090}:8090'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            # GHI ĐÈ KẾT NỐI CHO DOCKER
            DB_HOST: 'host.docker.internal'
            REDIS_HOST: 'redis'
            REVERB_HOST: 'reverb'
        volumes:
            - '.:/var/www/html'
        command: php artisan reverb:start --host=0.0.0.0 --port=8090
        networks:
            - sail
        depends_on:
            - laravel.test

    # 6. Laravel Horizon
    horizon:
        image: sail-app:8.5
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            # GHI ĐÈ KẾT NỐI CHO DOCKER
            DB_HOST: 'host.docker.internal'
            REDIS_HOST: 'redis'
            REVERB_HOST: 'reverb'
        volumes:
            - '.:/var/www/html'
        command: php artisan horizon
        networks:
            - sail
        depends_on:
            - redis
            - laravel.test

    # 7. Scheduler
    scheduler:
        image: sail-app:8.5
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            # GHI ĐÈ KẾT NỐI CHO DOCKER
            DB_HOST: 'host.docker.internal'
            REDIS_HOST: 'redis'
            REVERB_HOST: 'reverb'
        volumes:
            - '.:/var/www/html'
        command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
        networks:
            - sail
        depends_on:
            - laravel.test

# Thêm dịch vụ Mailpit để test gửi Email ở Local
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
            
networks:
    sail:
        driver: bridge

volumes:
    sail-redis:
        driver: local
